name: gymlog
description: "GymLog - 筋トレ記録アプリ"
publish_to: 'none'

version: 1.1.1+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.9
  google_sign_in: ^6.2.2

  # Share
  share_plus: ^10.1.4

  # Vibration / notifications
  vibration: ^2.0.0
  flutter_local_notifications: ^18.0.1

  # AdMob
  google_mobile_ads: ^5.3.0

  # Persistence for settings
  shared_preferences: ^2.3.2

  # Splash screen
  flutter_native_splash: ^2.4.6

  # State management
  provider: ^6.1.2

  # Localization / date formatting
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D0F"
  adaptive_icon_foreground: assets/icon/app_icon.png
  web:
    generate: false

flutter_native_splash:
  color: "#0D0D0F"
  image: assets/icon/app_icon.png
  android: true
  ios: true
  android_12:
    image: assets/icon/splash_android12.png
    color: "#0D0D0F"
    icon_background_color: "#0D0D0F"

flutter:
  uses-material-design: true
